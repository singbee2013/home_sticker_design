# 【可选 / 遗留】默认生产部署已改为原生脚本：bash scripts/start-all.sh prod
# 不再依赖本 compose。仅本地实验或特殊环境时使用。
# 阿里云 rootless Podman：可叠加 docker-compose.podman-host.yml
services:
  app:
    build: .
    image: decorai-app:latest
    container_name: decorai-app
    restart: unless-stopped
    expose:
      - "8080"
    # 勿写 127.0.0.1:3000 — rootless Podman 上常导致宿主机无监听 → curl 拒绝连接 → Nginx 502。
    # 云安全组一般未放行 3000，外网仍只走 80/443；本机 Nginx 反代 127.0.0.1:3000 可访问。
    ports:
      - "3000:8080"
    # Podman/rootless 下常见：容器内无法解析外网 DNS → Gemini 报 Temporary failure in name resolution
    dns:
      - "8.8.8.8"
      - "1.1.1.1"
    # 不要在生产环境写死 Google IP：地址池会变，易导致间歇性 SSL/连接失败。
    # 若仅有 Podman DNS 问题，可临时取消注释并换成当前解析结果（dig generativelanguage.googleapis.com）。
    # extra_hosts:
    #   - "generativelanguage.googleapis.com:142.250.x.x"
    environment:
      TZ: Asia/Shanghai
      LOG_DIR: /app/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # ---- App ----
      SECRET_KEY: ${SECRET_KEY:-please-change-me-to-a-32-char-random-string}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      # Sticker AI defaults to Gemini when built-in; set only to force another provider name.
      DECORAI_FORCE_DEFAULT_AI_PROVIDER: ${DECORAI_FORCE_DEFAULT_AI_PROVIDER:-}

      # ---- Azure OpenAI / Foundry (Entra ID 推荐用 Workload Identity) ----
      AZURE_OPENAI_ENDPOINT:    ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT:  ${AZURE_OPENAI_DEPLOYMENT:-gpt-image-1}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}
      AZURE_OPENAI_USE_ENTRA_ID: ${AZURE_OPENAI_USE_ENTRA_ID:-true}
      AZURE_OPENAI_API_KEY:     ${AZURE_OPENAI_API_KEY:-}
      AZURE_TENANT_ID:          ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID:          ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET:      ${AZURE_CLIENT_SECRET:-}

      # ---- Public OpenAI fallback ----
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.gptsapi.net/v1}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2-plus}
      GPT_IMAGE_API_MODE: ${GPT_IMAGE_API_MODE:-gptsapi}
      GPT_IMAGE_GPTSAPI_TEXT_TO_IMAGE_URL: ${GPT_IMAGE_GPTSAPI_TEXT_TO_IMAGE_URL:-https://api.gptsapi.net/api/v3/openai/gpt-image-2-plus/text-to-image}
      # ---- Google AI Studio / Gemini ----
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-image}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta}
      # ---- SiliconFlow ----
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-Kwai-Kolors/Kolors}
      SILICONFLOW_API_URL: ${SILICONFLOW_API_URL:-https://api.siliconflow.cn/v1}
      # ---- Tongyi Wanxiang / DashScope ----
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      WANXIANG_MODEL: ${WANXIANG_MODEL:-wanx2.1-t2i-turbo}
      DASHSCOPE_API_URL: ${DASHSCOPE_API_URL:-https://dashscope.aliyuncs.com}
    volumes:
      - ./data:/app/data                # SQLite db (or switch to postgres)
      # 必须挂载整个 static：场景图 scenes/、效果图 effects/、套图 suites/、素材 generated/ 等都在此树下；只挂 generated/uploads 会导致容器重建后其它目录文件丢失 → 前端「加载失败」
      - ./static:/app/static
      - ./logs:/app/logs                # 应用与访问日志（app.logging_setup）
      - ./config:/app/config:ro         # 热改配置：改完重启容器即生效
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # 默认不启动：与「宿主机 Nginx → 127.0.0.1:3000」部署一致；rootless Podman 也无法绑定特权端口 80。
  # 需要由 compose 单独占 80 时（例如 rootful Docker 整机只跑本栈）：docker compose --profile container-nginx up -d
  nginx:
    profiles:
      - container-nginx
    image: docker.io/library/nginx:1.27-alpine
    container_name: decorai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # 启用 TLS 时打开
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
