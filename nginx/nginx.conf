# DecorAI — Nginx reverse proxy
#
# Listens on :80 and forwards to the FastAPI container (`app:8080`).
# Adds gzip + long-cache for SPA assets, big upload limit for img2img.
#
# If you see "502 Bad Gateway" on refresh: upstream is down or reset during the request.
# On the host: curl -sS http://127.0.0.1:3000/api/health
# （bridge 模式：compose 映射 3000→8080；若叠加 docker-compose.podman-host.yml 则应用直接监听本机 3000）
# Expect {"status":"ok"}. If connection refused, restart the app container and check logs:
#   docker logs decorai-app --tail 200

upstream decorai_app {
    server app:8080;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large image uploads (img2img reference images)
    client_max_body_size 64m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml;

    # Long cache for hashed Vite assets
    location ~* ^/assets/.*\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|avif)$ {
        proxy_pass http://decorai_app;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Generated/uploaded images — cache short
    location /static/ {
        proxy_pass http://decorai_app;
        expires 1h;
        add_header Cache-Control "public";
    }

    # API must always hit backend JSON endpoints directly.
    location ^~ /api/ {
        proxy_pass http://decorai_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_connect_timeout 60s;
    }

    # Keep FastAPI docs reachable from the same domain.
    location ^~ /docs {
        proxy_pass http://decorai_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Everything else (API, /docs, SPA fallback)
    location / {
        proxy_pass http://decorai_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SPA + 长轮询；与 /api/ 一致拉长超时
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_connect_timeout 60s;
    }
}

